# Site settings
title: "82L Portfolio"
description: "Doing games, serious games and other things.<br/> Studying at the CNAM ENJMIN to be an Engineer in computing and multimedia"
url: 'https://82l.github.io'
baseurl: ''
profilepic: '/images/profile.png'
bkimage: '/images/bk1.jpg'
font_awesome: 'ead88c3c69.js'
collections:
  projects:
    id: projects
    title: "Game projects"
    keyVal: 1
    output: true
    sort_by: keyVal
  work_projects:
    id: work
    title: "Other IT projects"
    keyVal: 2
    output: true
    sort_by: keyVal
  misc_projects:
    id: misc
    title: "Miscellaneous projects"
    keyVal: 3
    output: true
    sort_by: keyVal



author:
  name: '82L'
  email: contacter82l@gmail.com
  twitter_username: 82l_GameDev
#  facebook_username:
  github_username:  82l
  gitlab_username:  82l
  itchio_username:  82l

gotWork: true
gotProjects : true
gotMisc : true

projectTypes:
  - Professional:
    typedesc : "Show professional projects"
    id: 1
  - Student:
    typedesc : "Show student projects"
    id: 2


# Build settings
destination: _site
markdown: kramdown
highlighter: rouge

sass:
    sass_dir: _sass
    style: compressed

kramdown:
  # use Github Flavored Markdown
  input: GFM
  # do not replace newlines by <br>s
  hard_wrap: false

plugins: ['jekyll-paginate']
exclude: ['README.md', 'screenshot-overview.png', "jekyll-uno-master.zip","jekyll-uno-timeline-master.zip","iframe-resizer-master.zip"]
